services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.8
    restart: unless-stopped
    ports:
      - "8989:8989"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Australia/Sydney
      UMASK: "002"
    volumes:
      - /mnt/data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8989/api/v3/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  radarr:
    image: lscr.io/linuxserver/radarr:5.2.6
    restart: unless-stopped
    ports:
      - "7878:7878"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: Australia/Sydney
      UMASK: "002"
    volumes:
      - /mnt/data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7878/api/v3/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
