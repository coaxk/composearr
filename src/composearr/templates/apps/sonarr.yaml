# yaml-language-server: $schema=../../schemas/app-template.json
_metadata:
  description: "TV series management and automation tool"
  category: media
  tags: [arr, media, tv]
  env_vars:
    - name: PUID
      default: "1000"
      description: "User ID for file permissions"
    - name: PGID
      default: "1000"
      description: "Group ID for file permissions"
    - name: TZ
      default: "UTC"
      description: "Timezone for the container"
  ports:
    - host: 8989
      container: 8989
      description: "Sonarr web interface"
  volumes_info:
    - name: sonarr_config
      description: "Sonarr configuration and database"
    - name: data
      description: "Media and download root path"

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.11
    container_name: sonarr
    env_file: [.env]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    ports:
      - "${SONARR_PORT:-8989}:8989"
    volumes:
      - sonarr_config:/config
      - ${DATA_PATH:-/data}:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sonarr_config:
