# yaml-language-server: $schema=../../schemas/app-template.json
_metadata:
  description: "BitTorrent client with web interface"
  category: download
  tags: [download, torrent]
  env_vars:
    - name: PUID
      default: "1000"
      description: "User ID for file permissions"
    - name: PGID
      default: "1000"
      description: "Group ID for file permissions"
    - name: TZ
      default: "UTC"
      description: "Timezone for the container"
    - name: WEBUI_PORT
      default: "8080"
      description: "Port for the qBittorrent web UI"
  ports:
    - host: 8080
      container: 8080
      description: "qBittorrent web interface"
    - host: 6881
      container: 6881
      description: "BitTorrent listening port (TCP/UDP)"
  volumes_info:
    - name: qbittorrent_config
      description: "qBittorrent configuration and state"
    - name: data
      description: "Download and media root path"

services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.0.3
    container_name: qbittorrent
    env_file: [.env]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=${WEBUI_PORT:-8080}
    ports:
      - "${QBITTORRENT_PORT:-8080}:8080"
      - "${QBITTORRENT_TORRENT_PORT:-6881}:6881"
      - "${QBITTORRENT_TORRENT_PORT:-6881}:6881/udp"
    volumes:
      - qbittorrent_config:/config
      - ${DATA_PATH:-/data}:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  qbittorrent_config:
