# yaml-language-server: $schema=../../schemas/app-template.json
_metadata:
  description: "Self-hosted RSS feed aggregator and reader"
  category: utility
  tags: [utility, rss, news, reader]
  env_vars:
    - name: PUID
      default: "1000"
      description: "User ID for file permissions"
    - name: PGID
      default: "1000"
      description: "Group ID for file permissions"
    - name: TZ
      default: "UTC"
      description: "Timezone for the container"
  ports:
    - host: 8080
      container: 80
      description: "FreshRSS web interface"
  volumes_info:
    - name: freshrss_config
      description: "FreshRSS configuration and database"

services:
  freshrss:
    image: lscr.io/linuxserver/freshrss:1.24.4
    container_name: freshrss
    env_file: [.env]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    ports:
      - "${FRESHRSS_PORT:-8080}:80"
    volumes:
      - freshrss_config:/config
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  freshrss_config:
