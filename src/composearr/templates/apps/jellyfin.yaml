# yaml-language-server: $schema=../../schemas/app-template.json
_metadata:
  description: "Free software media system for streaming and organizing media"
  category: media
  tags: [media, streaming, server]
  env_vars:
    - name: PUID
      default: "1000"
      description: "User ID for file permissions"
    - name: PGID
      default: "1000"
      description: "Group ID for file permissions"
    - name: TZ
      default: "UTC"
      description: "Timezone for the container"
  ports:
    - host: 8096
      container: 8096
      description: "Jellyfin web interface"
  volumes_info:
    - name: jellyfin_config
      description: "Jellyfin configuration and database"
    - name: data
      description: "Media library root path"

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:10.10.3
    container_name: jellyfin
    env_file: [.env]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    ports:
      - "${JELLYFIN_PORT:-8096}:8096"
    volumes:
      - jellyfin_config:/config
      - ${DATA_PATH:-/data}:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  jellyfin_config:
