# yaml-language-server: $schema=../../schemas/app-template.json
_metadata:
  description: "Self-hosted file storage and collaboration platform"
  category: storage
  tags: [storage, files, cloud, collaboration]
  env_vars:
    - name: PUID
      default: "1000"
      description: "User ID for file permissions"
    - name: PGID
      default: "1000"
      description: "Group ID for file permissions"
    - name: TZ
      default: "UTC"
      description: "Timezone for the container"
  ports:
    - host: 443
      container: 443
      description: "Nextcloud HTTPS web interface"
  volumes_info:
    - name: nextcloud_config
      description: "Nextcloud configuration and application data"
    - name: nextcloud_data
      description: "Nextcloud user files and data"

services:
  nextcloud:
    image: lscr.io/linuxserver/nextcloud:30.0.4
    container_name: nextcloud
    env_file: [.env]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    ports:
      - "${NEXTCLOUD_PORT:-443}:443"
    volumes:
      - nextcloud_config:/config
      - nextcloud_data:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:443/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  nextcloud_config:
  nextcloud_data:
