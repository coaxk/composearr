# yaml-language-server: $schema=../../schemas/app-template.json
_metadata:
  description: "Application dashboard and launcher for all your web apps"
  category: dashboard
  tags: [dashboard, homepage, organizer]
  env_vars:
    - name: PUID
      default: "1000"
      description: "User ID for file permissions"
    - name: PGID
      default: "1000"
      description: "Group ID for file permissions"
    - name: TZ
      default: "UTC"
      description: "Timezone for the container"
  ports:
    - host: 80
      container: 80
      description: "Heimdall HTTP web interface"
    - host: 443
      container: 443
      description: "Heimdall HTTPS web interface"
  volumes_info:
    - name: heimdall_config
      description: "Heimdall configuration and database"

services:
  heimdall:
    image: lscr.io/linuxserver/heimdall:2.6.3
    container_name: heimdall
    env_file: [.env]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    ports:
      - "${HEIMDALL_HTTP_PORT:-80}:80"
      - "${HEIMDALL_HTTPS_PORT:-443}:443"
    volumes:
      - heimdall_config:/config
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  heimdall_config:
