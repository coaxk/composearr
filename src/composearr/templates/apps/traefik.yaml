# yaml-language-server: $schema=../../schemas/app-template.json
_metadata:
  description: "Cloud-native reverse proxy and ingress controller with automatic TLS"
  category: infrastructure
  tags: [proxy, traefik, ingress]
  env_vars:
    - name: TRAEFIK_LOG_LEVEL
      default: "INFO"
      description: "Logging verbosity (DEBUG, INFO, WARN, ERROR)"
    - name: TRAEFIK_ACME_EMAIL
      default: ""
      description: "Email address for Let's Encrypt certificate registration"
  ports:
    - host: 80
      container: 80
      description: "HTTP entrypoint"
    - host: 443
      container: 443
      description: "HTTPS entrypoint"
    - host: 8080
      container: 8080
      description: "Traefik dashboard and API"
  volumes_info:
    - name: traefik_config
      description: "Traefik dynamic configuration files"
    - name: traefik_certs
      description: "ACME/Let's Encrypt certificate storage"

services:
  traefik:
    image: traefik:3.2
    container_name: traefik
    env_file: [.env]
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--log.level=${TRAEFIK_LOG_LEVEL:-INFO}"
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_config:/etc/traefik
      - traefik_certs:/certs
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  traefik_config:
  traefik_certs:
