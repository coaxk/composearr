# yaml-language-server: $schema=../../schemas/app-template.json
_metadata:
  description: "PostgreSQL relational database server"
  category: database
  tags: [database, postgresql]
  env_vars:
    - name: POSTGRES_USER
      default: "postgres"
      description: "Database superuser name"
    - name: POSTGRES_PASSWORD
      default: "changeme"
      description: "Database superuser password"
    - name: POSTGRES_DB
      default: "postgres"
      description: "Default database created on first start"
  ports:
    - host: 5432
      container: 5432
      description: "PostgreSQL database connections"
  volumes_info:
    - name: postgres_data
      description: "PostgreSQL data directory"

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    env_file: [.env]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
