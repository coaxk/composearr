# yaml-language-server: $schema=../../schemas/app-template.json
_metadata:
  description: "High-performance web server and reverse proxy"
  category: infrastructure
  tags: [web, proxy, nginx]
  env_vars:
    - name: NGINX_HOST
      default: "localhost"
      description: "Default server hostname"
    - name: NGINX_PORT
      default: "80"
      description: "HTTP listen port inside the container"
  ports:
    - host: 80
      container: 80
      description: "HTTP traffic"
    - host: 443
      container: 443
      description: "HTTPS traffic"
  volumes_info:
    - name: nginx_config
      description: "Nginx configuration files"
    - name: nginx_certs
      description: "TLS/SSL certificates"
    - name: nginx_html
      description: "Static web content"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    env_file: [.env]
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - nginx_config:/etc/nginx/conf.d
      - nginx_certs:/etc/nginx/certs
      - nginx_html:/usr/share/nginx/html
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  nginx_config:
  nginx_certs:
  nginx_html:
