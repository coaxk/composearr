# yaml-language-server: $schema=../../schemas/app-template.json
_metadata:
  description: "Movie management and automation tool"
  category: media
  tags: [arr, media, movies]
  env_vars:
    - name: PUID
      default: "1000"
      description: "User ID for file permissions"
    - name: PGID
      default: "1000"
      description: "Group ID for file permissions"
    - name: TZ
      default: "UTC"
      description: "Timezone for the container"
  ports:
    - host: 7878
      container: 7878
      description: "Radarr web interface"
  volumes_info:
    - name: radarr_config
      description: "Radarr configuration and database"
    - name: data
      description: "Media and download root path"

services:
  radarr:
    image: lscr.io/linuxserver/radarr:5.14
    container_name: radarr
    env_file: [.env]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    ports:
      - "${RADARR_PORT:-7878}:7878"
    volumes:
      - radarr_config:/config
      - ${DATA_PATH:-/data}:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  radarr_config:
