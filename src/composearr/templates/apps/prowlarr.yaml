# yaml-language-server: $schema=../../schemas/app-template.json
_metadata:
  description: "Indexer proxy and manager for arr applications"
  category: media
  tags: [arr, indexer]
  env_vars:
    - name: PUID
      default: "1000"
      description: "User ID for file permissions"
    - name: PGID
      default: "1000"
      description: "Group ID for file permissions"
    - name: TZ
      default: "UTC"
      description: "Timezone for the container"
  ports:
    - host: 9696
      container: 9696
      description: "Prowlarr web interface"
  volumes_info:
    - name: prowlarr_config
      description: "Prowlarr configuration and database"

services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:1.28
    container_name: prowlarr
    env_file: [.env]
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    ports:
      - "${PROWLARR_PORT:-9696}:9696"
    volumes:
      - prowlarr_config:/config
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  prowlarr_config:
