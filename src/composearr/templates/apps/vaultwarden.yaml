# yaml-language-server: $schema=../../schemas/app-template.json
_metadata:
  description: "Lightweight Bitwarden-compatible password manager server"
  category: security
  tags: [security, passwords, bitwarden]
  env_vars:
    - name: TZ
      default: "UTC"
      description: "Timezone for the container"
  ports:
    - host: 8080
      container: 8080
      description: "Vaultwarden web interface"
  volumes_info:
    - name: vaultwarden_data
      description: "Vaultwarden vault data and configuration"

services:
  vaultwarden:
    image: vaultwarden/server:1.32.7
    container_name: vaultwarden
    env_file: [.env]
    environment:
      - TZ=${TZ:-UTC}
      - ROCKET_PORT=8080
    ports:
      - "${VAULTWARDEN_PORT:-8080}:8080"
    volumes:
      - vaultwarden_data:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/alive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  vaultwarden_data:
