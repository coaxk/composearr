services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.14
    container_name: sonarr-hardlink
    restart: unless-stopped
    environment:
      TZ: America/New_York
      PUID: 1000
      PGID: 1000
    volumes:
      - ./config:/config
      - /media/tv:/tv
      - /downloads:/downloads

  radarr:
    image: lscr.io/linuxserver/radarr:5.20
    container_name: radarr-hardlink
    restart: unless-stopped
    environment:
      TZ: America/New_York
      PUID: 1000
      PGID: 1000
    volumes:
      - ./config:/config
      - /media/movies:/movies
      - /downloads:/downloads
