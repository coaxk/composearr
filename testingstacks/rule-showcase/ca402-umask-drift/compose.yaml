services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.14
    container_name: sonarr-umask
    restart: unless-stopped
    environment:
      TZ: America/New_York
      PUID: 1000
      PGID: 1000
      UMASK: "002"

  radarr:
    image: lscr.io/linuxserver/radarr:5.20
    container_name: radarr-umask
    restart: unless-stopped
    environment:
      TZ: America/New_York
      PUID: 1000
      PGID: 1000
      UMASK: "022"
