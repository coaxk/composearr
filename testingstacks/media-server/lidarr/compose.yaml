services:
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    ports:
      - "8686:8686"
    volumes:
      - ./config:/config
      - /data/media/music:/music
      - /data/torrents:/downloads
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
