services:
  mariadb:
    image: mariadb:latest
    container_name: mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: MariaDBRootP@ss789!
      MYSQL_DATABASE: homelab
      MYSQL_USER: homelab
      MYSQL_PASSWORD: MariaDBUserP@ss456!

volumes:
  mariadb_data:
